name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake checks
        run: nix flake check

      - name: Go tests
        run: nix develop --command go test ./...

      - name: Neovim action-link E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_action_links.lua'

      - name: Neovim template picker E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_telescope_templates.lua'

      - name: Neovim search order E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_telescope_search_order.lua'

      - name: Neovim Babel visibility E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_babel_visibility.lua'

      - name: Neovim graph E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_graph.lua'

      - name: Neovim backlinks E2E
        run: |
          export TRACK_VAULT="$(mktemp -d)"
          export TRACK_CACHE_DIR="$(mktemp -d)"
          nix run .#test-nvim -- --headless '+luafile scripts/e2e/nvim_backlinks.lua'
