name: Pages

# Build the bundled help notes (docs/help) into a static site with `track export-site` and publish it
# to GitHub Pages. Reusable (workflow_call) so the Release workflow deploys on every release; also runs
# when a release is published directly and on manual dispatch.
#
# GitHub Pages must be enabled for the repository with the source set to "GitHub Actions".
on:
  workflow_call:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; do not cancel an in-progress one so a deploy always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: ttak0422
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build + prerender the site. SITE_BASE is the Pages base path (e.g. /track/ for a project site),
      # baked into the bundle so the path-routed, prerendered pages resolve assets, data, and routes under
      # the subpath. make site builds the client + SSR bundles, exports the data, and prerenders each route.
      - name: Build + prerender static help site
        env:
          SITE_BASE: ${{ steps.pages.outputs.base_path }}
        run: |
          nix develop --command bash -euo pipefail -c 'make site SITE_OUT=./_site'

      # HTML is cached by the Pages CDN for up to 10 minutes and cannot be hash-named, so a stale page
      # can reference chunks a fresh deploy just deleted. Carry the previous deployment's hashed assets
      # forward so that window keeps working. asset-manifest.txt is written before the merge, so each
      # deploy carries exactly one generation back (no unbounded accumulation); hashed names are
      # content-addressed, so mixing generations is safe.
      - name: Keep previous deployment's assets for the CDN cache window
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          (cd _site && find assets -type f | sort > asset-manifest.txt)
          curl -fsSL --max-time 30 "$SITE_URL/asset-manifest.txt" -o /tmp/prev-manifest.txt || {
            echo "no previous manifest; skipping carry-forward"; exit 0; }
          carried=0
          while IFS= read -r f; do
            case "$f" in assets/*) ;; *) continue ;; esac
            [ -e "_site/$f" ] && continue
            mkdir -p "_site/$(dirname "$f")"
            if curl -fsSL --max-time 60 "$SITE_URL/$f" -o "_site/$f"; then
              carried=$((carried + 1))
            else
              rm -f "_site/$f"
            fi
          done < /tmp/prev-manifest.txt
          echo "carried $carried assets from the previous deployment"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
