name: Release

# Manually cut a release: derive the next semantic version from existing release/v* branches, create a
# release/vX.Y.Z branch from the chosen base, publish a matching GitHub release, then deploy the help
# site to GitHub Pages. The version/branch scheme (semver resolved from release branches) has no
# mainstream action that fits, so it is a small custom script; release creation uses the gh CLI and the
# Pages step reuses the official pages workflow.
on:
  workflow_dispatch:
    inputs:
      base:
        description: Base branch to derive the release from
        default: main
        type: string
      bump:
        description: Semantic version bump
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout base
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base }}
          fetch-depth: 0

      - name: Resolve next version
        id: version
        run: |
          set -euo pipefail
          latest=$(git ls-remote --heads origin 'release/v*' \
            | sed -E 's#.*refs/heads/release/v##' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -t. -k1,1n -k2,2n -k3,3n \
            | tail -1 || true)
          latest=${latest:-0.0.0}
          IFS=. read -r major minor patch <<<"$latest"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          version="v${major}.${minor}.${patch}"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved $version from base '${{ inputs.base }}' (previous v$latest)"

      - name: Create release branch
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          branch="release/$version"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "::error::$branch already exists"
            exit 1
          fi
          git push origin "HEAD:refs/heads/$branch"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          gh release create "$version" \
            --target "release/$version" \
            --title "$version" \
            --generate-notes

  pages:
    needs: release
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
