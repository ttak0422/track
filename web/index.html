<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="track is a linked Markdown knowledge base: wiki links, backlinks, charts, diagrams, and a local web workspace."
    />
    <link rel="icon" type="image/svg+xml" href="/k_logo.svg" />
    <title>track</title>
    <script>
      // The Go server replaces __TRACK_DEFAULT_THEME__ with the configured default before serving this
      // file, so the saved theme is applied before first paint and there is no flash of the wrong theme.
      (function () {
        var serverDefault = "__TRACK_DEFAULT_THEME__";
        window.__trackDefaultTheme = serverDefault;
        var theme = localStorage.getItem("track.theme") || serverDefault;
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
        }
        // The Go server replaces __TRACK_SESSION__ with a token unique to its process. The tab strip
        // uses it to keep restored tabs across a reload (same token) but drop them on a fresh launch
        // (new token). Left as the literal placeholder in the static export, where it stays constant.
        window.__trackSession = "__TRACK_SESSION__";
        // The static export replaces __TRACK_START_PAGE__ with the root note's published id, so the app
        // redirects straight to the start page on launch without first fetching site.json. The live
        // server replaces it with empty (it uses the heatmap home, not a start-page redirect).
        window.__trackStartPage = "__TRACK_START_PAGE__";
      })();
    </script>
    __TRACK_COLOR_OVERRIDES__
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
