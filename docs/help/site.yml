# Published-site config for this help site: `track export-site --src docs/help`.
# It travels with the content it publishes, so this site lands on the same page and draws the same
# icons on anyone's machine and in CI. What describes one *build* of it instead — where the output is
# written (--out), which frontend build goes into it (--frontend), which origin it is served from
# (--base-url) — stays a build flag: this same directory is published both to GitHub Pages and to a
# per-PR preview URL.
#
# The pages themselves stay pure Markdown: what a page says *about itself* is never written in its
# body. It is said here, once, in the site's own config.

# The site's entry page: a file base name (docs/help/index.md) or a page title, base name first.
# Unset, a page named `index` is the fallback. There is no flag for it — the front door is the same
# wherever this site is deployed.
home: index

# Per-page note-level metadata, keyed by file base name — the directory's stand-in for a vault note's
# sidecar: the page's own icon, its tags (which drive tag pages, #tag search, and query FROM
# filters), its cover image (image: an assets/<file> reference, spelled like the sidecar's — feeding
# gallery query layouts and og:image), its typed props (props: the sidecar's props map, queryable as
# props.<key> like any note's — quote a date so it stays a scalar), and its place in the hierarchy
# (up: the parent page, by file base name or title — the breadcrumb trail above the page and the
# parent's children list). An entry naming no `<name>.md`, saying nothing at all, an image naming no
# asset, or an up resolving to no page (or the page itself) is a build error, never a silent no-op.
pages:
  babel: {icon: 🧪, tags: [help/authoring], up: cli, props: {section: authoring}}
  blocks: {up: linking}
  charts: {icon: 📊, tags: [help/visualization/charts], up: visualization, image: assets/cover-charts.svg, props: {section: visualization, reviewed: "2026-06-24"}}
  cli: {icon: ⌨️, tags: [help/reference], up: index, props: {section: reference}}
  dashboard: {icon: 🏠}
  diagrams: {icon: 📐, tags: [help/visualization/diagrams], up: visualization, image: assets/cover-diagrams.svg, props: {section: visualization}}
  embeds: {icon: 🧩, tags: [help/visualization/embeds], up: visualization, image: assets/cover-embeds.svg, props: {section: visualization}}
  hierarchy: {up: index}
  index: {icon: 🧭}
  linking: {icon: 🔗, tags: [help/concepts], up: index}
  mindmaps: {icon: 🧠}
  properties: {icon: 🏷️, tags: [help/authoring], up: index, props: {section: authoring, reviewed: "2026-07-02"}}
  query: {tags: [help/reference], props: {section: reference, reviewed: "2026-07-10"}}
  search: {icon: 🔍}
  syntax: {tags: [help/authoring], up: index, props: {section: authoring, reviewed: "2026-06-05"}}
  visualization: {icon: 📈, tags: [help/visualization], up: index, image: assets/cover-visualization.svg, props: {section: visualization}}
  web: {icon: 🌐, tags: [help/reference], up: index, props: {section: reference, reviewed: "2026-06-18"}}

# No icon mappings (icons: tags/kinds — config.NoteIcon's fallback rungs) — deliberately. syntax.md
# and query.md set no icon of their own, and with no mapping to land in they have none at all: the
# default state of most notes in a fresh vault, kept visible on this site so the gallery demo on the
# query page shows track's built-in no-image card face.
