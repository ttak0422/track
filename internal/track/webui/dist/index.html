<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/k_logo.svg" />
    <title>track</title>
    <script>
      (function () {
        var serverDefault = "__TRACK_DEFAULT_THEME__";
        window.__trackDefaultTheme = serverDefault;
        var theme = localStorage.getItem("track.theme") || serverDefault;
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
        }
      })();
    </script>
    __TRACK_COLOR_OVERRIDES__
  </head>
  <body>
    <div id="root">
      <p>
        The track web UI has not been built. Run
        <code>nix build .#track-cli</code> or
        <code>npm --prefix web run build</code> and rebuild to populate it.
      </p>
    </div>
  </body>
</html>
